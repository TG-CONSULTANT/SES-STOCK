<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ทรัพย์รุ่งเรือง-สต็อกอะไหล่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        html { font-size: 110%; } 
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .bg-out { background: linear-gradient(135deg, #991b1b 0%, #ef4444 100%); }
        .bg-in { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        .bg-stock { background: linear-gradient(135deg, #0f172a 0%, #2563eb 100%); }
        .tab-active { border-bottom: 4px solid #fff; font-weight: 600; color: #fff; }
        .col-1 { width: 18%; } .col-2 { width: 46%; } .col-3 { width: 18%; } .col-4 { width: 18%; }
        .wrap-text { white-space: normal !important; word-wrap: break-word; overflow-wrap: break-word; line-height: 1.4; padding: 10px 4px !important; }
        .text-right-num { text-align: right !important; padding-right: 12px !important; }
        .awesomplete { width: 100% !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="app()" x-init="init()">
    
    <div :class="tab === 'out' ? 'bg-out' : (tab === 'in' ? 'bg-in' : 'bg-stock')" class="text-white px-2 py-2 shadow-md sticky top-0 z-50 transition-colors duration-300">
        <h1 class="text-center font-semibold text-lg mb-1">ทรัพย์รุ่งเรือง-สต็อกอะไหล่</h1>
        <div class="flex justify-around text-sm">
            <button @click="changeTab('out')" :class="tab === 'out' ? 'tab-active' : ''" class="pb-1 px-2">เบิกออก</button>
            <button @click="changeTab('in')" :class="tab === 'in' ? 'tab-active' : ''" class="pb-1 px-2">รับเข้า</button>
            <button @click="changeTab('stock')" :class="tab === 'stock' ? 'tab-active' : ''" class="pb-1 px-2 font-mono">STOCK</button>
        </div>
    </div>

    <div class="container mx-auto px-1.5 mt-3 mb-12" x-cloak>
        <template x-if="tab === 'out' || tab === 'in'">
            <div class="space-y-4">
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-500 mb-1" x-text="tab === 'out' ? 'ผู้เบิก' : 'ผู้รับเข้า'"></label>
                        <template x-if="tab === 'out'">
                            <input id="userOut" class="w-full border border-slate-300 p-2.5 rounded-xl bg-slate-50 outline-none" placeholder="พิมพ์ชื่อผู้เบิก...">
                        </template>
                        <template x-if="tab === 'in'">
                            <select x-model="form.user" class="w-full border border-slate-300 p-2.5 rounded-xl bg-slate-50 outline-none">
                                <option value="">-- เลือกรายชื่อผู้รับ --</option>
                                <template x-for="u in usersIn">
                                    <option :value="u" x-text="u"></option>
                                </template>
                            </select>
                        </template>
                    </div>
                    <button @click="startScan()" :class="tab === 'out' ? 'bg-red-700' : 'bg-green-700'" class="w-full text-white py-3.5 rounded-xl font-semibold flex items-center justify-center gap-2 active:scale-95 transition-transform font-bold">
                        📷 สแกน QR Code
                    </button>
                    <div id="reader" class="w-full rounded-xl overflow-hidden shadow-inner"></div>
                    <div class="overflow-hidden rounded-xl border border-slate-200">
                        <table class="w-full text-left table-fixed border-collapse text-sm">
                            <thead class="bg-slate-50 text-[0.65rem] font-bold uppercase text-slate-400 border-b">
                                <tr>
                                    <th class="p-2 col-1 text-center">รหัส</th>
                                    <th class="p-2 col-2">รายการ</th>
                                    <th class="p-2 col-3 text-right-num">เหลือ</th>
                                    <th class="p-2 col-4 text-right-num" x-text="tab === 'out' ? 'เบิก' : 'รับเข้า'"></th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                <template x-if="scannedItem">
                                    <tr :class="tab === 'out' ? 'bg-red-50/40' : 'bg-green-50/40'">
                                        <td class="p-2 border-b text-center font-mono truncate align-top pt-3" x-text="scannedItem.code"></td>
                                        <td class="p-2 border-b wrap-text align-top font-medium" x-text="scannedItem.name"></td>
                                        <td class="p-2 border-b text-right-num font-semibold align-top pt-3" x-text="scannedItem.balance"></td>
                                        <td class="p-2 border-b align-top pt-2">
                                            <input type="number" x-model.number="form.qty" @focus="$event.target.select()" class="w-full border border-slate-400 rounded-lg text-right pr-2 py-1.5 font-bold outline-none" min="1">
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <textarea x-model="form.note" class="w-full border border-slate-300 p-3 rounded-xl text-sm outline-none" rows="2" placeholder="ระบุหมายเหตุ..."></textarea>
                    <button @click="saveData()" :disabled="loading || !form.code" :class="tab === 'out' ? 'bg-red-600' : 'bg-green-600'" class="w-full text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 disabled:bg-slate-300" x-text="loading ? '⏳ กำลังบันทึก...' : 'บันทึกข้อมูล'"></button>
                </div>
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-3 border-l-4 pl-2 text-base" :class="tab === 'out' ? 'border-red-500' : 'border-green-500'">ประวัติวันนี้ (แตะเพื่อแก้ไข)</h3>
                    <div class="space-y-2">
                        <template x-for="item in (tab === 'out' ? historyOut : historyIn)">
                            <div @click="openEdit(item)" class="p-3 border rounded-xl flex justify-between items-start active:bg-slate-50 transition-all border-slate-100">
                                <div class="flex-1 pr-2">
                                    <div class="text-[0.65rem] text-slate-400 font-mono" x-text="new Date(item.time).toLocaleTimeString('th-TH')"></div>
                                    <div class="text-sm font-semibold text-slate-700 wrap-text p-0" x-text="item.name"></div>
                                    <div class="text-[0.7rem] text-slate-500 mt-1" x-text="'โดย: ' + item.user"></div>
                                </div>
                                <div class="text-right shrink-0">
                                    <div :class="tab === 'out' ? 'text-red-600' : 'text-green-600'" class="font-bold text-lg" x-text="item.qty"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <template x-if="tab === 'stock'">
            <div class="space-y-3">
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-end gap-2">
                        <div class="w-3/4">
                            <input id="searchStock" @focus="$event.target.value = ''" class="w-full border border-slate-300 p-3 rounded-xl outline-none" placeholder="ค้นหาจากชื่อรายการ...">
                        </div>
                        <button @click="searchData()" class="bg-blue-600 text-white px-5 rounded-xl font-bold">ค้นหา</button>
                    </div>
                    <div class="mt-4 overflow-hidden rounded-xl border border-blue-100 shadow-sm" x-show="searchResult">
                        <table class="w-full text-sm table-fixed border-collapse">
                            <tr class="bg-blue-600 text-white font-semibold">
                                <td class="p-2 col-2">รายการ</td><td class="p-2 col-1 text-center">ตำแหน่ง</td><td class="p-2 col-1 text-right-num">SS</td><td class="p-2 col-1 text-right-num font-bold">เหลือ</td>
                            </tr>
                            <tr class="bg-white">
                                <td class="p-2 border-b wrap-text font-semibold text-slate-800" x-text="searchResult.name"></td><td class="p-2 border-b text-center align-top pt-3 font-mono" x-text="searchResult.pos"></td><td class="p-2 border-b text-right-num align-top pt-3" x-text="searchResult.ss"></td><td class="p-2 border-b text-right-num font-bold text-blue-600 align-top pt-3" x-text="searchResult.qty"></td>
                            </tr>
                        </table>
                    </div>
                </div>
                <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-200 overflow-hidden text-sm font-bold">
                    <table class="w-full text-left table-fixed border-collapse">
                        <thead class="bg-slate-50 text-[0.65rem] font-bold text-slate-400 border-b">
                            <tr><th class="p-2 col-2">รายการ</th><th class="p-2 col-1 text-center">POS</th><th class="p-2 col-1 text-right-num">SS</th><th class="p-2 col-1 text-right-num">เหลือ</th></tr>
                        </thead>
                        <tbody>
                            <template x-for="item in stockAll">
                                <tr :class="Number(item[3]) <= Number(item[2]) ? 'bg-red-50 text-red-600 font-bold' : 'hover:bg-slate-50'">
                                    <td class="p-2 border-b wrap-text" x-text="item[0]"></td><td class="p-2 border-b text-center align-top pt-3 font-mono" x-text="item[1]"></td><td class="p-2 border-b text-right-num align-top pt-3" x-text="item[2]"></td><td class="p-2 border-b text-right-num font-bold align-top pt-3" x-text="item[3]"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>
    </div>

    <div x-show="editModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm" x-cloak x-transition>
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl space-y-5" @click.away="editModal = false">
            <h2 class="text-xl font-bold text-slate-800">แก้ไขข้อมูล</h2>
            <div class="text-sm font-semibold wrap-text" x-text="editForm.name"></div>
            <div class="space-y-4">
                <input type="text" x-model="editForm.user" class="w-full border p-3 rounded-xl outline-none" placeholder="ผู้บันทึก">
                <input type="number" x-model.number="editForm.qty" class="w-full border p-3 rounded-xl text-right font-bold text-blue-600">
                <textarea x-model="editForm.note" class="w-full border p-3 rounded-xl text-sm" rows="2"></textarea>
            </div>
            <div class="flex gap-3 pt-2">
                <button @click="editModal = false" class="flex-1 py-3 font-bold text-slate-400">ยกเลิก</button>
                <button @click="updateData()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200">บันทึกใหม่</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTwirlUDMw1tglhif4x6pG4aQOTuiUpPxUWMaYCUXtxnQV_QhNugBucQ-8xpNu782T/exec";
        function app() {
            return {
                tab: 'out', loading: false, usersOut: [], usersIn: [], stockAll: [], searchTerms: [], scannedItem: null, searchResult: null, quickLookup: {},
                historyOut: [], historyIn: [], editModal: false,
                form: { user: '', qty: 1, note: '', code: '', name: '' },
                editForm: { row: '', user: '', qty: '', note: '', name: '' },
                async init() {
                    const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'getInitialData' }) });
                    const data = await res.json();
                    this.usersOut = data.usersOut; this.usersIn = data.usersIn; this.stockAll = data.stockAll;
                    this.searchTerms = data.searchTerms; this.quickLookup = data.quickLookup;
                    this.historyOut = data.historyOut; this.historyIn = data.historyIn;
                    this.initAutocomplete();
                },
                initAutocomplete() {
                    setTimeout(() => {
                        const elStock = document.getElementById('searchStock');
                        if (elStock) new Awesomplete(elStock, { list: this.searchTerms, minChars: 1, autoFirst: true });
                        const elUserOut = document.getElementById('userOut');
                        if (elUserOut) {
                            const awe = new Awesomplete(elUserOut, { list: this.usersOut, minChars: 1, autoFirst: true });
                            elUserOut.addEventListener('awesomplete-selectcomplete', (e) => { this.form.user = e.text.value; });
                            elUserOut.addEventListener('input', (e) => { this.form.user = e.target.value; });
                        }
                    }, 500);
                },
                changeTab(t) { this.tab = t; this.resetForm(); this.initAutocomplete(); },
                resetForm() { this.scannedItem = null; this.form.code = ''; this.form.name = ''; this.form.qty = 1; this.form.note = ''; if(this.tab === 'out') { const el = document.getElementById('userOut'); if(el) el.value = ''; } },
                startScan() {
                    const html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: 250 }, (text) => {
                        html5QrCode.stop(); document.getElementById('reader').innerHTML = '';
                        const item = this.quickLookup[text.trim()];
                        if(item) { this.scannedItem = item; this.form.code = item.code; this.form.name = item.name; }
                        else alert('ไม่พบรหัส: ' + text);
                    }).catch(e => console.log(e));
                },
                async saveData() {
                    if(!this.form.user) return alert('❌ กรุณาระบุชื่อ');
                    this.loading = true;
                    try {
                        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'saveTransaction', type: this.tab, ...this.form }) });
                        alert('✅ สำเร็จ'); this.resetForm(); await this.init(); 
                    } catch (e) { alert('ผิดพลาด'); } finally { this.loading = false; }
                },
                openEdit(item) { this.editForm = { ...item }; this.editModal = true; },
                async updateData() {
                    this.loading = true; this.editModal = false;
                    try {
                        await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'updateTransaction', type: this.tab, ...this.editForm }) });
                        alert('🛠 แก้ไขเรียบร้อย'); await this.init();
                    } catch (e) { alert('ผิดพลาด'); } finally { this.loading = false; }
                },
                searchData() {
                    const val = document.getElementById('searchStock').value;
                    const f = this.stockAll.find(i => i[0].includes(val) || val.includes(i[0]));
                    if(f) {
                        this.searchResult = { name: f[0], pos: f[1], ss: f[2], qty: f[3] };
                    } else {
                        alert('ไม่พบข้อมูล');
                    }
                }
            }
        }
    </script>
</body>
</html>
