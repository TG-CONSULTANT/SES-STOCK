<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทรัพย์รุ่งเรือง-สต็อกอะไหล่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>
    <style>
        .bg-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .tab-active { border-bottom: 4px solid #fff; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10" x-data="app()">
    
    <div class="bg-gradient text-white p-6 shadow-lg rounded-b-3xl">
        <h1 class="text-2xl font-bold text-center">ทรัพย์รุ่งเรือง สต็อกอะไหล่</h1>
        <div class="flex justify-around mt-6">
            <button @click="tab = 'out'" :class="tab === 'out' ? 'tab-active' : ''" class="pb-2">เบิกออก</button>
            <button @click="tab = 'in'" :class="tab === 'in' ? 'tab-active' : ''" class="pb-2">รับเข้า</button>
            <button @click="tab = 'stock'" :class="tab === 'stock' ? 'tab-active' : ''" class="pb-2">Stock</button>
        </div>
    </div>

    <div class="container mx-auto px-4 mt-6">
        
        <template x-if="tab === 'out' || tab === 'in'">
            <div class="bg-white p-5 rounded-2xl shadow-sm space-y-4">
                <label class="block font-bold text-gray-700">ผู้บันทึก</label>
                <select x-model="form.user" class="w-full border p-3 rounded-xl bg-gray-50">
                    <option value="">เลือกผู้บันทึก</option>
                    <template x-for="u in users">
                        <option :value="u" x-text="u"></option>
                    </template>
                </select>

                <button @click="startScan()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                    📷 สแกน QR Code
                </button>
                <div id="reader" class="w-full"></div>

                <div class="overflow-x-auto mt-4">
                    <table class="w-full text-sm text-left border">
                        <thead class="bg-gray-200">
                            <tr>
                                <th class="p-2">รหัส</th>
                                <th class="p-2">รายการ</th>
                                <th class="p-2 text-center">เหลือ</th>
                                <th class="p-2 text-center" x-text="tab === 'out' ? 'เบิก' : 'รับ'"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-if="scannedItem">
                                <tr>
                                    <td class="p-2" x-text="scannedItem.code"></td>
                                    <td class="p-2" x-text="scannedItem.name"></td>
                                    <td class="p-2 text-center" x-text="scannedItem.balance"></td>
                                    <td class="p-2">
                                        <input type="number" x-model="form.qty" class="w-16 border rounded text-center" min="1" :max="tab === 'out' ? scannedItem.balance : 9999">
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <textarea x-model="form.note" class="w-full border p-3 rounded-xl mt-2" placeholder="หมายเหตุ..."></textarea>
                
                <button @click="saveData()" :disabled="loading" class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-lg shadow-md active:scale-95 transition"
                    x-text="loading ? 'กำลังบันทึก...' : (tab === 'out' ? 'บันทึกเบิกออก' : 'บันทึกรับเข้า')">
                </button>
            </div>
        </template>

        <template x-if="tab === 'stock'">
            <div class="space-y-6">
                <div class="bg-white p-5 rounded-2xl shadow-sm">
                    <div class="flex gap-2">
                        <input id="searchStock" class="flex-1 border p-3 rounded-xl" placeholder="พิมพ์ชื่อ/รหัสอะไหล่...">
                        <button @click="searchData()" class="bg-indigo-600 text-white px-6 rounded-xl">ค้นหา</button>
                    </div>
                    
                    <div class="mt-4 overflow-x-auto" x-show="searchResult">
                        <table class="w-full text-sm border">
                            <tr class="bg-indigo-100"><th class="p-2">รายการ</th><th class="p-2">ตำแหน่ง</th><th class="p-2">SS</th><th class="p-2">เหลือ</th></tr>
                            <template x-if="searchResult">
                                <tr>
                                    <td class="p-2" x-text="searchResult[1]"></td>
                                    <td class="p-2 text-center" x-text="searchResult[2]"></td>
                                    <td class="p-2 text-center" x-text="searchResult[3]"></td>
                                    <td class="p-2 text-center font-bold" x-text="searchResult[4]"></td>
                                </tr>
                            </template>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm">
                    <h3 class="font-bold mb-3 border-l-4 border-red-500 pl-2">สถานะสต็อกทั้งหมด</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm border">
                            <thead class="bg-gray-100">
                                <tr><th class="p-2">รายการ</th><th class="p-2">ตำแหน่ง</th><th class="p-2">SS</th><th class="p-2">เหลือ</th></tr>
                            </thead>
                            <tbody>
                                <template x-for="item in stockAll">
                                    <tr :class="item[3] <= item[2] ? 'bg-red-100 text-red-700' : ''">
                                        <td class="p-2 border-b" x-text="item[0]"></td>
                                        <td class="p-2 border-b text-center" x-text="item[1]"></td>
                                        <td class="p-2 border-b text-center" x-text="item[2]"></td>
                                        <td class="p-2 border-b text-center font-bold" x-text="item[3]"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz433pyNnU9OZKYPzOtk2HUgD3z1MsoEarhB3tfg_c-fgyTEmgGqvX9KI-3QTnF_q--/exec";

        function app() {
            return {
                tab: 'out',
                loading: false,
                users: [],
                stockAll: [],
                scannedItem: null,
                searchResult: null,
                form: { user: '', qty: 1, note: '', code: '', name: '' },

                init() {
                    this.fetchInitialData();
                },

                async fetchInitialData() {
                    const res = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'getInitialData' })
                    });
                    const data = await res.json();
                    this.users = data.users;
                    this.stockAll = data.stockAll;
                    new Awesomplete(document.getElementById('searchStock'), { list: data.searchTerms });
                },

                startScan() {
                    const html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                        async (decodedText) => {
                            html5QrCode.stop();
                            const res = await fetch(WEB_APP_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'scanCode', code: decodedText })
                            });
                            const item = await res.json();
                            if(item) {
                                this.scannedItem = item;
                                this.form.code = item.code;
                                this.form.name = item.name;
                            } else {
                                alert('ไม่พบข้อมูลรหัสนี้');
                            }
                        }
                    );
                },

                async saveData() {
                    if(!this.form.user || !this.form.code) return alert('กรุณาระบุผู้บันทึกและสแกนของ');
                    this.loading = true;
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'saveTransaction',
                            type: this.tab,
                            ...this.form
                        })
                    });
                    alert('บันทึกสำเร็จ');
                    location.reload();
                },

                searchData() {
                    const term = document.getElementById('searchStock').value;
                    // ค้นหาจาก stockAll (จำลองการค้นหาจากข้อมูลที่มีอยู่)
                    const found = this.stockAll.find(item => item[0].includes(term));
                    if(found) this.searchResult = [null, ...found];
                }
            }
        }
    </script>
</body>
</html>
