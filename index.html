<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ทรัพย์รุ่งเรือง-สต็อกอะไหล่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/awesomplete/1.1.5/awesomplete.min.js"></script>
    <style>
        /* เพิ่มขนาดตัวอักษร 10% จากมาตรฐาน (ประมาณ 1.1rem หรือ 18px) */
        html { font-size: 110%; } 
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        
        .bg-gradient { background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%); }
        .tab-active { border-bottom: 3px solid #fff; font-weight: bold; color: #fff; }
        
        /* กำหนดสัดส่วนตาราง 18%:46%:18%:18% */
        .col-1 { width: 18%; }
        .col-2 { width: 46%; }
        .col-3 { width: 18%; }
        .col-4 { width: 18%; }

        .awesomplete { width: 100% !important; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="app()" x-init="init()">
    
    <div class="bg-gradient text-white px-2 py-2 shadow-lg sticky top-0 z-50">
        <h1 class="text-center font-bold mb-1">ทรัพย์รุ่งเรือง-สต็อกอะไหล่</h1>
        <div class="flex justify-around text-sm">
            <button @click="changeTab('out')" :class="tab === 'out' ? 'tab-active' : ''" class="pb-1 px-4 transition-all">เบิกออก</button>
            <button @click="changeTab('in')" :class="tab === 'in' ? 'tab-active' : ''" class="pb-1 px-4 transition-all">รับเข้า</button>
            <button @click="changeTab('stock')" :class="tab === 'stock' ? 'tab-active' : ''" class="pb-1 px-4 transition-all">Stock</button>
        </div>
    </div>

    <div class="container mx-auto px-2 mt-3" x-cloak>
        
        <template x-if="tab === 'out' || tab === 'in'">
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 space-y-3">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">ผู้บันทึก</label>
                    <select x-model="form.user" class="w-full border border-slate-300 p-2 rounded-lg bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">-- เลือกรายชื่อ --</option>
                        <template x-for="u in users">
                            <option :value="u" x-text="u"></option>
                        </template>
                    </select>
                </div>

                <button @click="startScan()" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2 active:scale-95 transition">
                    📷 สแกน QR Code
                </button>
                <div id="reader" class="w-full rounded-lg overflow-hidden border-2 border-dashed border-slate-200"></div>

                <div class="overflow-hidden rounded-lg border border-slate-200">
                    <table class="w-full text-left table-fixed border-collapse">
                        <thead class="bg-slate-100 text-xs text-slate-600 font-bold uppercase">
                            <tr>
                                <th class="p-2 border-b col-1 text-center">รหัส</th>
                                <th class="p-2 border-b col-2">รายการ</th>
                                <th class="p-2 border-b col-3 text-center">เหลือ</th>
                                <th class="p-2 border-b col-4 text-center" x-text="tab === 'out' ? 'เบิก' : 'รับ'"></th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">
                            <template x-if="scannedItem">
                                <tr class="bg-blue-50/30">
                                    <td class="p-2 border-b text-center font-mono truncate" x-text="scannedItem.code"></td>
                                    <td class="p-2 border-b truncate" x-text="scannedItem.name"></td>
                                    <td class="p-2 border-b text-center" x-text="scannedItem.balance"></td>
                                    <td class="p-2 border-b">
                                        <input type="number" x-model.number="form.qty" 
                                               @focus="$event.target.select()"
                                               class="w-full border border-blue-400 rounded text-center py-1 font-bold outline-none focus:bg-white" 
                                               min="1">
                                    </td>
                                </tr>
                            </template>
                            <template x-if="!scannedItem">
                                <tr>
                                    <td colspan="4" class="p-6 text-center text-slate-400 italic">รอสแกนอะไหล่...</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <textarea x-model="form.note" class="w-full border border-slate-300 p-2 rounded-lg text-sm outline-none" rows="2" placeholder="หมายเหตุ..."></textarea>
                
                <button @click="saveData()" :disabled="loading || !form.code || !form.user" 
                    class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg active:scale-95 disabled:bg-slate-300 transition-all"
                    x-text="loading ? 'กำลังประมวลผล...' : 'บันทึกข้อมูล'">
                </button>
            </div>
        </template>

        <template x-if="tab === 'stock'">
            <div class="space-y-3">
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <input id="searchStock" class="w-full border border-slate-300 p-2.5 rounded-lg outline-none" placeholder="ค้นหารายการ/รหัส...">
                        </div>
                        <button @click="searchData()" class="bg-blue-600 text-white px-4 rounded-lg font-bold">ค้นหา</button>
                    </div>
                    
                    <div class="mt-3 overflow-hidden rounded-lg border border-blue-200" x-show="searchResult">
                        <table class="w-full text-sm table-fixed border-collapse">
                            <tr class="bg-blue-600 text-white font-bold">
                                <td class="p-2 col-2">รายการ</td>
                                <td class="p-2 col-1 text-center">ตำแหน่ง</td>
                                <td class="p-2 col-1 text-center">SS</td>
                                <td class="p-2 col-1 text-center">เหลือ</td>
                            </tr>
                            <tr class="bg-white">
                                <td class="p-2 border-b truncate font-semibold" x-text="searchResult.name"></td>
                                <td class="p-2 border-b text-center" x-text="searchResult.pos"></td>
                                <td class="p-2 border-b text-center" x-text="searchResult.ss"></td>
                                <td class="p-2 border-b text-center font-bold text-blue-600" x-text="searchResult.qty"></td>
                            </tr>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-2 border-l-4 border-blue-600 pl-2">รายการสต็อกปัจจุบัน</h3>
                    <div class="overflow-hidden rounded-lg border border-slate-200">
                        <table class="w-full text-left table-fixed border-collapse">
                            <thead class="bg-slate-50 text-xs font-bold text-slate-500 border-b">
                                <tr>
                                    <th class="p-2 col-2">รายการ</th>
                                    <th class="p-2 col-1 text-center">ตำแหน่ง</th>
                                    <th class="p-2 col-1 text-center">SS</th>
                                    <th class="p-2 col-1 text-center">เหลือ</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                <template x-for="item in stockAll">
                                    <tr :class="Number(item[3]) <= Number(item[2]) ? 'bg-red-50 text-red-600 font-bold' : 'hover:bg-slate-50'">
                                        <td class="p-2 border-b truncate" x-text="item[0]"></td>
                                        <td class="p-2 border-b text-center font-mono" x-text="item[1]"></td>
                                        <td class="p-2 border-b text-center" x-text="item[2]"></td>
                                        <td class="p-2 border-b text-center font-bold" x-text="item[3]"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZotol0jNhr3aLm7oGlSDFnArTmBqstsCFpARaXrCh1tECVeUa1yF-IZMfi51WvQKF/exec";

        function app() {
            return {
                tab: 'out',
                loading: false,
                users: [],
                stockAll: [],
                searchTerms: [],
                scannedItem: null,
                searchResult: null,
                form: { user: '', qty: 1, note: '', code: '', name: '' },

                async init() {
                    const res = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'getInitialData' })
                    });
                    const data = await res.json();
                    this.users = data.users;
                    this.stockAll = data.stockAll;
                    this.searchTerms = data.searchTerms;
                    this.setupAutocomplete();
                },

                setupAutocomplete() {
                    setTimeout(() => {
                        const input = document.getElementById('searchStock');
                        if (input) {
                            new Awesomplete(input, { list: this.searchTerms, minChars: 1, autoFirst: true });
                        }
                    }, 500);
                },

                changeTab(newTab) {
                    this.tab = newTab;
                    this.scannedItem = null; // ล้างข้อมูลสแกนค้างเมื่อเปลี่ยนหน้า
                    this.form.code = '';
                    this.form.name = '';
                    this.form.qty = 1;
                    this.form.note = '';
                    if(newTab === 'stock') this.setupAutocomplete();
                },

                startScan() {
                    const html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
                        async (decodedText) => {
                            html5QrCode.stop();
                            document.getElementById('reader').innerHTML = '';
                            const res = await fetch(WEB_APP_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'scanCode', code: decodedText })
                            });
                            const item = await res.json();
                            if(item) {
                                this.scannedItem = item;
                                this.form.code = item.code;
                                this.form.name = item.name;
                                this.form.qty = 1;
                            } else {
                                alert('ไม่พบข้อมูลอะไหล่');
                            }
                        }
                    ).catch(err => console.error(err));
                },

                async saveData() {
                    if(this.tab === 'out' && this.form.qty > this.scannedItem.balance) {
                        alert('จำนวนเบิกห้ามเกินจำนวนคงเหลือ!');
                        return;
                    }
                    this.loading = true;
                    try {
                        await fetch(WEB_APP_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'saveTransaction', type: this.tab, ...this.form })
                        });
                        alert('บันทึกสำเร็จ');
                        this.scannedItem = null;
                        this.form.code = '';
                        this.form.name = '';
                        this.form.qty = 1;
                        this.form.note = '';
                        // อัปเดตข้อมูล Stock ใหม่โดยไม่รีโหลดหน้า
                        await this.init();
                    } finally {
                        this.loading = false;
                    }
                },

                searchData() {
                    const val = document.getElementById('searchStock').value;
                    const found = this.stockAll.find(i => i[0].includes(val) || val.includes(i[0]));
                    if(found) {
                        this.searchResult = { name: found[0], pos: found[1], ss: found[2], qty: found[3] };
                    } else {
                        alert('ไม่พบข้อมูล');
                    }
                }
            }
        }
    </script>
</body>
</html>
